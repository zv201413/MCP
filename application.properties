# ===== WorldMagic v2.1.0 Multi-Protocol Configuration =====
# Place this file in: plugins/application.properties

# ===== Basic Settings =====
domain=example.com
email=admin@example.com

# ===== Enabled Protocols =====
# Comma-separated list: hysteria2, vmess-ws, vless-ws, naive, anytls, tuic, argo
enabled-protocols=hysteria2,vmess-ws,anytls

# ===== Hysteria2 Settings (UDP/QUIC) =====
hy2-port=25565
hy2-password=
hy2-up-mbps=100
hy2-down-mbps=100
hy2-obfs-password=
hy2-sni=itunes.apple.com

# ===== Vmess-WS Settings (WebSocket + TLS) =====
vmess-port=25566
vmess-uuid=
vmess-path=/vmess

# ===== VLESS-WS Settings (WebSocket + TLS) =====
vless-port=25568
vless-uuid=
vless-path=/vless

# ===== NaiveProxy Settings (HTTPS Forward Proxy) =====
naive-port=25569
naive-username=admin
naive-password=
naive-sni=www.apple.com

# ===== AnyTLS Settings (TLS Padding) =====
anytls-port=25567
anytls-password=
anytls-sni=www.apple.com

# ===== Argo Tunnel Settings (Cloudflare) =====
argo-enabled=false
argo-token=your-cloudflare-tunnel-token
argo-hostname=your-domain.com
argo-cf-ip=www.visa.com.sg
argo-cf-port=443

# ===== Tuic Settings (QUIC Legacy) =====
tuic-port=25565
tuic-uuid=
tuic-password=
tuic-version=1.6.5

# ===== SSHX Web Terminal =====
sshx-enabled=true

# ===== ttyd Web Terminal (Recommended) =====
# ttyd-enabled: 是否启用 ttyd 终端
ttyd-enabled=false
# ttyd-port: 监听端口
ttyd-port=25575
# ttyd-password: 连接密码。留空则自动随机生成一个 12 位密码
ttyd-password=

# ttyd 支持两种运行模式：
# 模式一（直连）：面板已开放额外端口（如 25575），ttyd 监听 0.0.0.0，浏览器直接访问，零延迟
# 模式二（隧道）：仅开放 25565，需先启用 argo-enabled=true，ttyd 监听 127.0.0.1:7681，配合 Argo 隧道穿透，完全隐蔽

# ===== Cloudflare SSH Tunnel (Stable Remote SSH) =====
cf-ssh-enabled=false
cf-ssh-token=your-cloudflare-tunnel-token
cf-ssh-hostname=your-ssh-hostname.example.com
cf-ssh-local-port=2222

# ===== GitHub Gist Sync =====
gist-id=your-gist-id
gh-token=your-github-personal-access-token
gist-sshx-file=sshx_PPMC.txt
gist-sub-file=sub.txt
gist-ttyd-file=ttyd_PPMC.txt

# ===== General Settings =====
remarks-prefix=JP
self-sign-cert=true
