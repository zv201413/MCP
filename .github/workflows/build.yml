name: Build WorldMagic Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -B

    - name: Upload JAR artifact
      # 这一步保留，它会将 jar 保存在 Actions 记录里，只有你能看到/下载
      uses: actions/upload-artifact@v4
      with:
        name: world-magic-jar
        path: target/world-magic.jar
        retention-days: 30

    # 之前的 Automatic Release 步骤已被删除
    # 现在即使点击 workflow_dispatch 或推送代码，也不会创建 Release。
