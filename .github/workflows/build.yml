name: Build WorldMagic Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # 修复 Exit Code 128 的关键：不处理有问题的子模块
        submodules: false 

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Force Clean Git Index
      run: |
        # 强行移除可能导致 128 错误的不规范目录索引
        git rm -r --cached world-magic-new || echo "No directory to clear"
        git rm -r --cached world-magic-upload || echo "No directory to clear"

    - name: Build with Maven
      run: mvn clean package -DskipTests -B

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: world-magic-jar
        # 确保路径匹配 pom.xml 定义的生成位置
        path: target/*.jar
