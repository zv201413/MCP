name: Build WorldMagic Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 必须改回 21，否则 Maven 无法完成 target 21 的编译任务
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -B

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: world-magic-jar
        path: target/world-magic.jar
        retention-days: 30

    - name: Commit and Push JAR
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        cp -f target/world-magic.jar world-magic.jar
        
        git add world-magic.jar
        if ! git diff --cached --quiet; then
          git commit -m "chore: update world-magic.jar [skip ci]"
          git pull --rebase origin main
          git push origin main
        else
          echo "No changes to commit"
        fi
